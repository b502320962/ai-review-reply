<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Review Reply</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>AI Review Reply</h1>
      </div>
      <div id="user-badge" class="user-badge hidden">
        <span id="plan-badge" class="plan-badge">FREE</span>
        <span id="credits-display" class="credits-display">0/30</span>
      </div>
    </div>

    <!-- Login Section (shown when not logged in) -->
    <div id="login-section" class="section">
      <div class="login-card">
        <h2>Welcome to AI Review Reply</h2>
        <p>Sign in to start generating AI-powered replies</p>
        <button id="google-login" class="btn btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <div class="login-features">
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>30 free replies per month</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Google Business & Yelp support</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Multiple reply tones</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Section (shown when logged in) -->
    <div id="main-section" class="section hidden">
      <!-- User Info -->
      <div class="user-info">
        <img id="user-avatar" class="user-avatar" src="" alt="avatar">
        <div class="user-details">
          <span id="user-name" class="user-name"></span>
          <span id="user-email" class="user-email"></span>
        </div>
        <button id="logout-btn" class="btn-icon" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Status -->
      <div id="status" class="status hidden">
        <div class="status-icon"></div>
        <span class="status-text"></span>
      </div>

      <!-- Review Input -->
      <div class="section-group">
        <label for="review-text">Review Content</label>
        <textarea id="review-text" placeholder="Paste the customer review here, or select it on the page and click 'Get Review'..." rows="3"></textarea>
        <button id="fetch-review" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Get Review from Page
        </button>
      </div>

      <!-- Tone Selection -->
      <div class="section-group">
        <label>Reply Tone</label>
        <div class="tone-grid">
          <button class="tone-btn active" data-tone="professional">Professional</button>
          <button class="tone-btn" data-tone="friendly">Friendly</button>
          <button class="tone-btn" data-tone="apologetic">Apologetic</button>
          <button class="tone-btn" data-tone="grateful">Grateful</button>
        </div>
      </div>

      <!-- Platform Selection -->
      <div class="section-group">
        <label>Platform</label>
        <div class="platform-grid">
          <button class="platform-btn active" data-platform="google">
            <svg width="14" height="14" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="platform-btn" data-platform="yelp">
            <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#FF1A1A"/></svg>
            Yelp
          </button>
        </div>
      </div>

      <!-- Generate Button -->
      <button id="generate" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Generate AI Reply
      </button>

      <!-- Result -->
      <div id="result" class="section-group hidden">
        <div class="result-header">
          <label>Generated Reply</label>
          <button id="copy-reply" class="btn-icon" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
        <div id="reply-text" class="reply-content"></div>
        <div class="result-actions">
          <button id="regenerate" class="btn btn-secondary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Regenerate
          </button>
          <button id="use-reply" class="btn btn-primary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Insert to Page
          </button>
        </div>
      </div>

      <!-- Upgrade Banner (shown for free users) -->
      <div id="upgrade-banner" class="upgrade-banner hidden">
        <div class="upgrade-content">
          <span class="upgrade-icon">⭐</span>
          <div class="upgrade-text">
            <strong>Upgrade to Pro</strong>
            <span>300 replies/month for $9.9/month</span>
          </div>
          <button id="upgrade-btn" class="btn btn-upgrade">Upgrade</button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <a href="#" id="view-history">History</a>
        <span>|</span>
        <a href="#" id="view-stats">Stats</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
